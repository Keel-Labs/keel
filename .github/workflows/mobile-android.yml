name: Android Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'vite.mobile.config.ts'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (beta or release)'
        required: true
        default: 'beta'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: VITE_API_URL=${{ secrets.API_URL }} npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release AAB
        env:
          KEEL_RELEASE_STORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}
          KEEL_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEEL_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEEL_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: keel-android-release
          path: android/app/build/outputs/bundle/release/*.aab

      - uses: ruby/setup-ruby@v1
        if: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 != '' }}
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Upload to Google Play
        if: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 != '' }}
        env:
          GOOGLE_PLAY_JSON_KEY: /tmp/play-key.json
        run: |
          echo "${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}" | base64 -d > /tmp/play-key.json
          cd android
          gem install fastlane
          fastlane ${{ github.event.inputs.lane || 'beta' }}
