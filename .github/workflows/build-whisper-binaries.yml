name: Build Whisper Binaries

# Run manually, or automatically when this workflow file changes
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-whisper-binaries.yml'

jobs:
  build-universal:
    name: Build Universal Binary
    runs-on: macos-latest   # Apple Silicon — can cross-compile for x86_64
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone whisper.cpp
        run: git clone --depth 1 https://github.com/ggerganov/whisper.cpp /tmp/whisper

      - name: Build arm64 binary
        run: |
          cd /tmp/whisper
          cmake -B build-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DWHISPER_NO_AVX=ON \
            -DWHISPER_NO_AVX2=ON \
            -DWHISPER_NO_F16C=ON \
            -DWHISPER_NO_FMA=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build-arm64 --target whisper-cli -j$(sysctl -n hw.logicalcpu)

      - name: Build x86_64 binary (cross-compile)
        run: |
          cd /tmp/whisper
          cmake -B build-x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DWHISPER_NO_AVX=ON \
            -DWHISPER_NO_AVX2=ON \
            -DWHISPER_NO_F16C=ON \
            -DWHISPER_NO_FMA=ON \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build-x64 --target whisper-cli -j$(sysctl -n hw.logicalcpu)

      - name: Create universal binary
        run: |
          ARM64=/tmp/whisper/build-arm64/bin/whisper-cli
          X64=/tmp/whisper/build-x64/bin/whisper-cli
          chmod +x "$ARM64" "$X64"
          lipo -create -output /tmp/whisper-macos-universal "$ARM64" "$X64"
          chmod +x /tmp/whisper-macos-universal
          echo "✅ Universal binary created"
          file /tmp/whisper-macos-universal
          ls -lh /tmp/whisper-macos-universal

      - name: Delete existing whisper-binaries release (if any)
        run: |
          gh release delete whisper-binaries --yes 2>/dev/null || true
          git push origin :refs/tags/whisper-binaries 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release and upload binary
        run: |
          gh release create whisper-binaries \
            --title "Whisper Binaries (auto-updated)" \
            --notes "Pre-compiled whisper-cli universal binary for macOS (arm64 + x64). Auto-downloaded by Keel on first use. Do not edit manually." \
            --prerelease \
            /tmp/whisper-macos-universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
