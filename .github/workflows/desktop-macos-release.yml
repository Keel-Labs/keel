name: Desktop macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-macos-dmg:
    name: Build signed notarized macOS DMG
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Validate signing secrets
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          missing=0
          for name in \
            MAC_CERTIFICATE_P12_BASE64 \
            MAC_CERTIFICATE_PASSWORD \
            APPLE_API_KEY_P8 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build signed notarized DMG
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          KEEL_APP_ID: ${{ vars.KEEL_APP_ID }}
        run: npm run dist:mac:release

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: keel-macos-dmg
          path: dist-packages/*.dmg

      - name: Upload builder logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keel-macos-builder-logs
          path: dist-packages/builder-debug.yml
