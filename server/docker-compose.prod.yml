version: '3.8'

# Production self-hosted stack: Keel API + Postgres + MinIO
# Usage:
#   1. Copy .env.example to .env and fill in real values
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. Server auto-migrates on first start

services:
  api:
    build: .
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://keel:${POSTGRES_PASSWORD:-keel}@postgres:5432/keel
      S3_ENDPOINT: http://minio:9000
      AUTO_MIGRATE: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel}
      POSTGRES_DB: keel
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keel']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
